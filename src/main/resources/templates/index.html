<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ага-ини</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        :root {
            --orange: #ff5a00;
            --orange-light: #fff3ec;
            --dark: #161616;
            --muted: #777;
            --line: #ececec;
            --white: #ffffff;
            --background: #f5f5f5;
        }

        body {
            background: var(--background);
            color: var(--dark);
            padding-bottom: 95px;
        }

        button,
        input {
            font-family: inherit;
        }

        button {
            cursor: pointer;
        }

        .page {
            width: 100%;
            max-width: 560px;
            min-height: 100vh;
            margin: 0 auto;
            background: var(--white);
        }

        .hero {
            background:
                linear-gradient(
                    rgba(0, 0, 0, 0.48),
                    rgba(0, 0, 0, 0.48)
                ),
                url(
                    'https://images.unsplash.com/photo-1515003197210-e0cd71810b5f'
                );

            background-size: cover;
            background-position: center;
            color: var(--white);
            padding: 18px 16px 24px;
            border-radius: 0 0 22px 22px;
        }

        .language-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 13px;
        }

        .language-switcher {
            display: flex;
            align-items: center;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(8px);
        }

        .language-button {
            border: none;
            border-radius: 9px;
            background: transparent;
            color: rgba(255, 255, 255, 0.78);
            padding: 7px 11px;
            font-size: 11px;
            font-weight: 900;
        }

        .language-button.active {
            background: var(--white);
            color: var(--orange);
        }

        .hero-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .logo {
            width: 58px;
            height: 58px;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.65);
            border-radius: 50%;
            background: #171717;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 900;
        }

        .brand h1 {
            margin-bottom: 4px;
            font-size: 23px;
        }

        .brand p {
            color: #eeeeee;
            font-size: 11px;
            line-height: 1.5;
        }

        .header-cart {
            min-width: 78px;
            padding: 9px 11px;
            border-radius: 14px;
            background: var(--white);
            color: var(--orange);
            text-align: center;
            text-decoration: none;
            font-size: 11px;
            font-weight: 900;
        }

        .header-cart span {
            display: block;
            margin-top: 4px;
            font-size: 10px;
        }

        .search-wrap {
            position: relative;
            margin-top: 18px;
        }

        .search-wrap input {
            width: 100%;
            padding: 14px 44px 14px 42px;
            border: none;
            border-radius: 14px;
            outline: none;
            font-size: 14px;
        }

        .search-icon {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            font-size: 17px;
        }

        .clear-search {
            position: absolute;
            top: 50%;
            right: 12px;
            display: none;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #999999;
            font-size: 18px;
        }

        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 14px 14px 4px;
            background: var(--white);
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-button {
            padding: 9px 13px;
            border: none;
            border-radius: 20px;
            background: #f5f5f5;
            color: #555555;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 800;
        }

        .category-button.active {
            background: var(--orange-light);
            color: var(--orange);
        }

        .content {
            padding: 14px;
        }

        .section-title {
            margin: 6px 0 12px;
            font-size: 19px;
            font-weight: 900;
        }

        .menu-list {
            display: grid;
            gap: 12px;
        }

        .food-card {
            display: grid;
            grid-template-columns: 105px 1fr;
            gap: 12px;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--white);
            box-shadow: 0 5px 16px rgba(0, 0, 0, 0.05);
        }

        .food-image {
            width: 105px;
            height: 105px;
            border-radius: 13px;
            background: #dddddd;
            object-fit: cover;
        }

        .food-info {
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .food-name-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .food-name {
            font-size: 15px;
            font-weight: 900;
            line-height: 1.3;
        }

        .favorite {
            border: none;
            background: transparent;
            color: #aaaaaa;
            font-size: 18px;
        }

        .food-description {
            display: -webkit-box;
            overflow: hidden;
            margin-top: 5px;
            color: var(--muted);
            font-size: 11px;
            line-height: 1.4;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .food-weight {
            margin-top: 4px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
        }

        .food-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: auto;
        }

        .price {
            color: var(--orange);
            white-space: nowrap;
            font-size: 14px;
            font-weight: 900;
        }

        .add-button {
            min-width: 82px;
            padding: 9px 13px;
            border: none;
            border-radius: 10px;
            background: var(--orange);
            color: var(--white);
            font-size: 12px;
            font-weight: 900;
        }

        .unavailable-label {
            max-width: 150px;
            padding: 9px 10px;
            border: 1px solid #fecaca;
            border-radius: 10px;
            background: #fff0f0;
            color: #dc2626;
            text-align: center;
            font-size: 11px;
            font-weight: 900;
            line-height: 1.25;
        }

        .food-card.unavailable {
            opacity: 0.78;
        }

        .food-card.unavailable .food-image {
            filter: grayscale(25%);
        }

        .counter {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .counter button {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 9px;
            background: var(--orange-light);
            color: var(--orange);
            font-size: 18px;
            font-weight: 900;
        }

        .counter span {
            min-width: 20px;
            text-align: center;
            font-size: 13px;
            font-weight: 900;
        }

        .empty {
            padding: 35px 20px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--white);
            color: var(--muted);
            text-align: center;
        }

        .empty h3 {
            color: var(--dark);
        }

        .empty p {
            margin-top: 8px;
            font-size: 12px;
            line-height: 1.5;
        }

        .bottom-cart {
            position: fixed;
            bottom: 12px;
            left: 50%;
            z-index: 1000;
            display: none;
            width: calc(100% - 24px);
            max-width: 536px;
            padding: 10px;
            transform: translateX(-50%);
            border-radius: 16px;
            background: var(--white);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.2);
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .bottom-cart.show {
            display: flex;
        }

        .cart-summary {
            min-width: 0;
        }

        .cart-count {
            color: var(--muted);
            font-size: 12px;
        }

        .cart-total {
            margin-top: 3px;
            font-size: 17px;
            font-weight: 900;
        }

        .open-cart {
            padding: 13px 18px;
            border-radius: 12px;
            background: var(--orange);
            color: var(--white);
            white-space: nowrap;
            text-decoration: none;
            font-size: 13px;
            font-weight: 900;
        }

        @media (max-width: 390px) {
            .food-card {
                grid-template-columns: 90px 1fr;
            }

            .food-image {
                width: 90px;
                height: 90px;
            }

            .brand h1 {
                font-size: 19px;
            }

            .logo {
                width: 50px;
                height: 50px;
                font-size: 11px;
            }

            .header-cart {
                min-width: 67px;
                padding: 8px;
            }

            .open-cart {
                padding: 12px 13px;
                font-size: 11px;
            }
        }
            .food-image-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
        }
    </style>
</head>

<body>

<div class="page">

    <header class="hero">

        <div class="language-row">

            <div class="language-switcher">

                <button
                        id="kyButton"
                        type="button"
                        class="language-button"
                        onclick="changeLanguage('ky')"
                >
                    KG
                </button>

                <button
                        id="ruButton"
                        type="button"
                        class="language-button"
                        onclick="changeLanguage('ru')"
                >
                    RU
                </button>

            </div>

        </div>

        <div class="hero-top">

            <div class="brand">

                <div class="logo" style="overflow:hidden;background:#fff;padding:0;">
                    <img
                            src="/logo.jpg"
                            alt="ага-ини"
                            style="width:100%;height:100%;object-fit:cover;border-radius:50%;"
                            onerror="this.style.display='none';"
                    >
                </div>

                <div>
                    <h1>ага-ини</h1>

                    <p id="workingHoursText">
                        Күн сайын 09:00 — 20:00
                    </p>

                    <p id="locationText">
                        Базар-Коргон
                    </p>
                </div>

            </div>

            <a href="/cart" class="header-cart">

                <span id="headerCartText">
                    🛒 Себет
                </span>

                <span id="headerCartAmount">
                    0 сом
                </span>

            </a>

        </div>

        <div class="search-wrap">

            <span class="search-icon">🔍</span>

            <input
                    id="searchInput"
                    type="text"
                    placeholder="Тамак издөө..."
                    oninput="handleSearch()"
            >

            <button
                    id="clearSearchButton"
                    type="button"
                    class="clear-search"
                    onclick="clearSearch()"
            >
                ✕
            </button>

        </div>

    </header>

    <div id="categoryList" class="categories"></div>

    <main class="content">

        <h2 id="menuTitle" class="section-title">
            Меню
        </h2>

        <div id="menuList" class="menu-list">

            <div class="empty">
                Меню жүктөлүп жатат...
            </div>

        </div>

    </main>

</div>

<div id="bottomCart" class="bottom-cart">

    <div class="cart-summary">

        <div id="cartCount" class="cart-count">
            Себетте 0 товар
        </div>

        <div id="cartTotal" class="cart-total">
            0 сом
        </div>

    </div>

    <a
            id="openCartText"
            href="/cart"
            class="open-cart"
    >
        Себетке өтүү →
    </a>

</div>

<script>
    let allMenuItems = [];
    let selectedCategory = 'ALL';

    let currentLanguage =
        localStorage.getItem('customerLanguage') || 'ky';

    function formatQuantity(value) {
        return String(Math.max(0, Math.round(Number(value || 0))));
    }

    function changeQuantity(current, delta) {
        return Math.max(0, Math.round(Number(current || 0) + delta));
    }

    const translations = {
        ky: {
            workingHours: 'Күн сайын 09:00 — 20:00',
            location: 'Базар-Коргон',
            cart: '🛒 Себет',
            searchPlaceholder: 'Тамак издөө...',
            all: 'Баары',
            menu: 'Меню',
            loadingMenu: 'Меню жүктөлүп жатат...',
            add: 'Кошуу +',
            unavailable: 'Азырынча жеткиликтүү эмес',
            som: 'сом',
            cartItems: 'Себетте {count} товар',
            openCart: 'Себетке өтүү →',
            notFoundTitle: 'Тамак табылган жок',
            notFoundText: 'Башка сөз менен издеп көрүңүз.',
            ingredientsMissing: 'Курамы көрсөтүлгөн эмес',
            grams: 'г',
            food: 'Тамак',
            menuError: 'Менюну алуу мүмкүн болгон жок',
            errorTitle: 'Ката чыкты'
        },

        ru: {
            workingHours: 'Ежедневно 09:00 — 20:00',
            location: 'Базар-Коргон',
            cart: '🛒 Корзина',
            searchPlaceholder: 'Поиск блюда...',
            all: 'Все',
            menu: 'Меню',
            loadingMenu: 'Меню загружается...',
            add: 'Добавить +',
            unavailable: 'Сейчас недоступно',
            som: 'сом',
            cartItems: 'В корзине: {count}',
            openCart: 'Перейти в корзину →',
            notFoundTitle: 'Блюдо не найдено',
            notFoundText: 'Попробуйте ввести другое название.',
            ingredientsMissing: 'Состав не указан',
            grams: 'г',
            food: 'Блюдо',
            menuError: 'Не удалось загрузить меню',
            errorTitle: 'Произошла ошибка'
        }
    };

    function t(key) {
        return translations[currentLanguage][key] || key;
    }

    function isItemAvailable(item) {
        if (!item) {
            return false;
        }

        return !(
            item.available === false
            || item.available === 0
            || item.available === '0'
            || String(item.available).toLowerCase() === 'false'
        );
    }

    function changeLanguage(language) {
        currentLanguage = language;

        localStorage.setItem(
            'customerLanguage',
            language
        );

        applyLanguage();
    }

    function applyLanguage() {
        document.documentElement.lang =
            currentLanguage === 'ru' ? 'ru' : 'ky';

        document.getElementById('kyButton')
            .classList.toggle(
                'active',
                currentLanguage === 'ky'
            );

        document.getElementById('ruButton')
            .classList.toggle(
                'active',
                currentLanguage === 'ru'
            );

        document.getElementById('workingHoursText').textContent =
            t('workingHours');

        document.getElementById('locationText').textContent =
            t('location');

        document.getElementById('headerCartText').textContent =
            t('cart');

        document.getElementById('searchInput').placeholder =
            t('searchPlaceholder');

        document.getElementById('menuTitle').textContent =
            t('menu');

        document.getElementById('openCartText').textContent =
            t('openCart');

        createCategories();
        renderMenu();
        updateCartView();
    }

    function getCart() {
        try {
            const savedCart = JSON.parse(
                localStorage.getItem('cart')
            );

            return Array.isArray(savedCart)
                ? savedCart.map(item => ({
                    ...item,
                    quantity: Math.max(
                        0,
                        Math.round(Number(item.quantity || 0))
                    )
                })).filter(item => item.quantity > 0)
                : [];
        } catch (error) {
            return [];
        }
    }

    function saveCart(cart) {
        localStorage.setItem(
            'cart',
            JSON.stringify(cart)
        );

        updateCartView();
        renderMenu();
    }

    function getMenuItemKey(item) {
        if (
            item.id !== null
            && item.id !== undefined
        ) {
            return 'menu-' + item.id;
        }

        return (
            item.nameKg
            || item.name
            || item.nameRu
            || ''
        );
    }

    function getLocalizedName(item) {
        if (currentLanguage === 'ru') {
            return (
                item.nameRu
                || item.name
                || item.nameKg
                || t('food')
            );
        }

        return (
            item.nameKg
            || item.name
            || item.nameRu
            || t('food')
        );
    }

    function getLocalizedDescription(item) {
        if (currentLanguage === 'ru') {
            return (
                item.ingredientsRu
                || item.descriptionRu
                || item.ingredients
                || item.description
                || item.ingredientsKg
                || item.descriptionKg
                || t('ingredientsMissing')
            );
        }

        return (
            item.ingredientsKg
            || item.descriptionKg
            || item.ingredients
            || item.description
            || item.ingredientsRu
            || item.descriptionRu
            || t('ingredientsMissing')
        );
    }

    function getOriginalCategory(item) {
        return (
            item.categoryKg
            || item.category
            || item.categoryRu
            || 'Башка'
        );
    }

    function getLocalizedCategory(item) {
        if (currentLanguage === 'ru') {
            return (
                item.categoryRu
                || item.category
                || item.categoryKg
                || 'Другое'
            );
        }

        return (
            item.categoryKg
            || item.category
            || item.categoryRu
            || 'Башка'
        );
    }

    function findCartItem(cart, item) {
        const itemKey = getMenuItemKey(item);

        return cart.find(cartItem => {
            if (cartItem.key === itemKey) {
                return true;
            }

            if (
                item.id !== null
                && item.id !== undefined
                && Number(cartItem.itemId) === Number(item.id)
            ) {
                return true;
            }

            const possibleNames = [
                item.name,
                item.nameKg,
                item.nameRu
            ].filter(Boolean);

            return possibleNames.includes(cartItem.name);
        });
    }

    function findCartItemIndex(cart, item) {
        const itemKey = getMenuItemKey(item);

        return cart.findIndex(cartItem => {
            if (cartItem.key === itemKey) {
                return true;
            }

            if (
                item.id !== null
                && item.id !== undefined
                && Number(cartItem.itemId) === Number(item.id)
            ) {
                return true;
            }

            const possibleNames = [
                item.name,
                item.nameKg,
                item.nameRu
            ].filter(Boolean);

            return possibleNames.includes(cartItem.name);
        });
    }

    function addToCartById(itemId) {
        const item = allMenuItems.find(menuItem => {
            return Number(menuItem.id) === Number(itemId);
        });

        if (!item || !isItemAvailable(item)) {
            return;
        }

        const cart = getCart();
        const existingItem = findCartItem(cart, item);

        if (existingItem) {
            existingItem.quantity =
                changeQuantity(existingItem.quantity, 1);

            existingItem.key = getMenuItemKey(item);
            existingItem.itemId = item.id;
            existingItem.name = getLocalizedName(item);
            existingItem.nameKg =
                item.nameKg || item.name || '';
            existingItem.nameRu =
                item.nameRu || item.name || '';
            existingItem.image = item.image || '';
            existingItem.price =
                Number(item.price || 0);
        } else {
            cart.push({
                key: getMenuItemKey(item),
                itemId: item.id,
                name: getLocalizedName(item),
                nameKg: item.nameKg || item.name || '',
                nameRu: item.nameRu || item.name || '',
                price: Number(item.price || 0),
                quantity: 1,
                image: item.image || ''
            });
        }

        saveCart(cart);
    }

    function increaseItemById(itemId) {
        const item = allMenuItems.find(menuItem => {
            return Number(menuItem.id) === Number(itemId);
        });

        if (!item || !isItemAvailable(item)) {
            return;
        }

        const cart = getCart();
        const existingItem = findCartItem(cart, item);

        if (existingItem) {
            existingItem.quantity =
                changeQuantity(existingItem.quantity, 1);

            existingItem.key = getMenuItemKey(item);
            existingItem.itemId = item.id;
            existingItem.name = getLocalizedName(item);
            existingItem.nameKg =
                item.nameKg || item.name || '';
            existingItem.nameRu =
                item.nameRu || item.name || '';
        }

        saveCart(cart);
    }

    function decreaseItemById(itemId) {
        const item = allMenuItems.find(menuItem => {
            return Number(menuItem.id) === Number(itemId);
        });

        if (!item) {
            return;
        }

        const cart = getCart();
        const itemIndex = findCartItemIndex(cart, item);

        if (itemIndex === -1) {
            return;
        }

        cart[itemIndex].quantity =
            changeQuantity(cart[itemIndex].quantity, -1);

        if (cart[itemIndex].quantity <= 0) {
            cart.splice(itemIndex, 1);
        }

        saveCart(cart);
    }

    function getItemQuantity(item) {
        const cart = getCart();
        const cartItem = findCartItem(cart, item);

        return cartItem
            ? Number(cartItem.quantity || 0)
            : 0;
    }

    function updateCartLanguage() {
        const cart = getCart();
        let changed = false;

        cart.forEach(cartItem => {
            const menuItem = allMenuItems.find(item => {
                if (
                    cartItem.itemId !== null
                    && cartItem.itemId !== undefined
                ) {
                    return (
                        Number(item.id)
                        === Number(cartItem.itemId)
                    );
                }

                const possibleNames = [
                    item.name,
                    item.nameKg,
                    item.nameRu
                ].filter(Boolean);

                return possibleNames.includes(cartItem.name);
            });

            if (!menuItem) {
                if (
                    currentLanguage === 'ru'
                    && cartItem.nameRu
                ) {
                    cartItem.name = cartItem.nameRu;
                    changed = true;
                }

                if (
                    currentLanguage === 'ky'
                    && cartItem.nameKg
                ) {
                    cartItem.name = cartItem.nameKg;
                    changed = true;
                }

                return;
            }

            cartItem.key = getMenuItemKey(menuItem);
            cartItem.itemId = menuItem.id;
            cartItem.name = getLocalizedName(menuItem);
            cartItem.nameKg =
                menuItem.nameKg || menuItem.name || '';
            cartItem.nameRu =
                menuItem.nameRu || menuItem.name || '';
            cartItem.price =
                Number(menuItem.price || cartItem.price || 0);
            cartItem.image =
                menuItem.image || cartItem.image || '';

            changed = true;
        });

        if (changed) {
            localStorage.setItem(
                'cart',
                JSON.stringify(cart)
            );
        }
    }

    function updateCartView() {
        updateCartLanguage();

        const cart = getCart();

        const itemCount = cart.reduce((sum, item) => {
            return sum + Number(item.quantity || 0);
        }, 0);

        const total = cart.reduce((sum, item) => {
            return (
                sum
                + Number(item.price || 0)
                * Number(item.quantity || 0)
            );
        }, 0);

        document.getElementById(
            'headerCartAmount'
        ).textContent =
            formatMoney(total) + ' ' + t('som');

        document.getElementById(
            'cartCount'
        ).textContent =
            t('cartItems').replace(
                '{count}',
                itemCount
            );

        document.getElementById(
            'cartTotal'
        ).textContent =
            formatMoney(total) + ' ' + t('som');

        const bottomCart =
            document.getElementById('bottomCart');

        if (itemCount > 0) {
            bottomCart.classList.add('show');
        } else {
            bottomCart.classList.remove('show');
        }
    }

    function createCategories() {
        const categoryList =
            document.getElementById('categoryList');

        const categories = [];

        allMenuItems.forEach(item => {
            const originalCategory =
                getOriginalCategory(item);

            const exists = categories.some(category => {
                return category.original === originalCategory;
            });

            if (!exists) {
                categories.push({
                    original: originalCategory,
                    label: getLocalizedCategory(item)
                });
            }
        });

        let html = `
            <button
                    type="button"
                    class="category-button ${
                        selectedCategory === 'ALL'
                            ? 'active'
                            : ''
                    }"
                    onclick="setCategory('ALL', this)"
            >
                ${escapeHtml(t('all'))}
            </button>
        `;

        categories.forEach(category => {
            const activeClass =
                selectedCategory === category.original
                    ? 'active'
                    : '';

            html += `
                <button
                        type="button"
                        class="category-button ${activeClass}"
                        onclick="setCategory(
                            '${escapeJs(category.original)}',
                            this
                        )"
                >
                    ${escapeHtml(category.label)}
                </button>
            `;
        });

        categoryList.innerHTML = html;
    }

    function setCategory(category, button) {
        selectedCategory = category;

        document.querySelectorAll(
            '.category-button'
        ).forEach(item => {
            item.classList.remove('active');
        });

        button.classList.add('active');

        renderMenu();
    }

    function handleSearch() {
        const searchInput =
            document.getElementById('searchInput');

        const clearButton =
            document.getElementById(
                'clearSearchButton'
            );

        clearButton.style.display =
            searchInput.value.trim().length > 0
                ? 'block'
                : 'none';

        renderMenu();
    }

    function clearSearch() {
        document.getElementById(
            'searchInput'
        ).value = '';

        document.getElementById(
            'clearSearchButton'
        ).style.display = 'none';

        renderMenu();
    }

    function renderMenu() {
        const menuList =
            document.getElementById('menuList');

        if (allMenuItems.length === 0) {
            menuList.innerHTML = `
                <div class="empty">
                    ${escapeHtml(t('loadingMenu'))}
                </div>
            `;

            return;
        }

        const searchText =
            document.getElementById('searchInput')
                .value
                .trim()
                .toLowerCase();

        const filteredItems =
            allMenuItems.filter(item => {
                const originalCategory =
                    getOriginalCategory(item);

                const matchesCategory =
                    selectedCategory === 'ALL'
                    || originalCategory === selectedCategory;

                const itemText = [
                    item.name,
                    item.nameKg,
                    item.nameRu,
                    item.description,
                    item.descriptionKg,
                    item.descriptionRu,
                    item.ingredients,
                    item.ingredientsKg,
                    item.ingredientsRu,
                    item.category,
                    item.categoryKg,
                    item.categoryRu
                ]
                    .filter(Boolean)
                    .join(' ')
                    .toLowerCase();

                const matchesSearch =
                    searchText.length === 0
                    || itemText.includes(searchText);

         return (
    matchesCategory
    && matchesSearch
);
            });

        if (filteredItems.length === 0) {
            menuList.innerHTML = `
                <div class="empty">

                    <h3>
                        ${escapeHtml(
                            t('notFoundTitle')
                        )}
                    </h3>

                    <p>
                        ${escapeHtml(
                            t('notFoundText')
                        )}
                    </p>

                </div>
            `;

            return;
        }

        menuList.innerHTML =
            filteredItems
                .map(item => createFoodCard(item))
                .join('');
    }

    function createFoodCard(item) {
        const rawImage =
            item.image
            ? String(item.image).trim()
            : "";

        const image =
            rawImage
                ? (
                    rawImage.startsWith("http://")
                    || rawImage.startsWith("https://")
                    || rawImage.startsWith("/")
                        ? rawImage
                        : "/" + rawImage
                )
                : "";

        const name = getLocalizedName(item);
        const description = getLocalizedDescription(item);
        const weight = Number(item.weight || 0);
        const weightHtml =
            weight > 0
                ? `
                    <div class="food-weight">
                        ${weight} ${escapeHtml(t('grams'))}
                    </div>
                `
                : '';
        const quantity = getItemQuantity(item);
        const itemId = Number(item.id);
        const available = isItemAvailable(item);

        let actionHtml;

        if (!available) {
            actionHtml = `
                <div class="unavailable-label">
                    ⚠️ ${escapeHtml(t('unavailable'))}
                </div>
            `;
        } else if (quantity > 0) {
            actionHtml = `
                <div class="counter">
                    <button
                            type="button"
                            onclick="decreaseItemById(${itemId})"
                    >
                        −
                    </button>

                    <span>${formatQuantity(quantity)}</span>

                    <button
                            type="button"
                            onclick="increaseItemById(${itemId})"
                    >
                        +
                    </button>
                </div>
            `;
        } else {
            actionHtml = `
                <button
                        type="button"
                        class="add-button"
                        onclick="addToCartById(${itemId})"
                >
                    ${escapeHtml(t('add'))}
                </button>
            `;
        }

        return `
            <article class="food-card ${available ? '' : 'unavailable'}">
                ${
                    image
                        ? `
                            <img
                                    class="food-image"
                                    src="${escapeHtml(image)}"
                                    alt="${escapeHtml(name)}"
                                    onerror="
                                        this.onerror = null;
                                        this.outerHTML =
                                        '<div class=&quot;food-image food-image-placeholder&quot;>🍽</div>';
                                    "
                            >
                        `
                        : `
                            <div class="food-image food-image-placeholder">
                                🍽
                            </div>
                        `
                }

                <div class="food-info">
                    <div class="food-name-row">
                        <div class="food-name">
                            ${escapeHtml(name)}
                        </div>

                        <button
                                type="button"
                                class="favorite"
                        >
                            ♡
                        </button>
                    </div>

                    <div class="food-description">
                        ${escapeHtml(description)}
                    </div>

                    ${weightHtml}

                    <div class="food-bottom">
                        <div class="price">
                            ${formatMoney(item.price)}
                            ${escapeHtml(t('som'))}
                        </div>

                        ${actionHtml}
                    </div>
                </div>
            </article>
        `;
    }



    function formatMoney(value) {
        return Number(value || 0).toLocaleString(
            'ru-RU',
            {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }
        );
    }

    function escapeHtml(value) {
        if (
            value === null
            || value === undefined
        ) {
            return '';
        }

        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function escapeJs(value) {
        if (
            value === null
            || value === undefined
        ) {
            return '';
        }

        return String(value)
            .replaceAll('\\', '\\\\')
            .replaceAll("'", "\\'")
            .replaceAll('\n', ' ');
    }

    fetch('/menu')
        .then(response => {
            if (!response.ok) {
                throw new Error(t('menuError'));
            }

            return response.json();
        })
        .then(data => {
            allMenuItems =
                Array.isArray(data)
                    ? data
                    : [];

            const currentCart = getCart();
            const cleanedCart = currentCart.filter(cartItem => {
                const menuItem = allMenuItems.find(item => {
                    return (
                        Number(item.id) === Number(cartItem.itemId)
                        || getMenuItemKey(item) === cartItem.key
                    );
                });

                return Boolean(menuItem) && isItemAvailable(menuItem);
            });

            if (cleanedCart.length !== currentCart.length) {
                localStorage.setItem(
                    'cart',
                    JSON.stringify(cleanedCart)
                );
            }

            applyLanguage();
        })
        .catch(error => {
            document.getElementById(
                'menuList'
            ).innerHTML = `
                <div class="empty">

                    <h3>
                        ${escapeHtml(t('errorTitle'))}
                    </h3>

                    <p>
                        ${escapeHtml(error.message)}
                    </p>

                </div>
            `;
        });

    applyLanguage();
</script>

</body>
</html>
