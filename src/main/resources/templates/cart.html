<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Себет — ага-ини</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        :root {
            --orange: #ff5a00;
            --orange-light: #fff3ec;
            --dark: #171717;
            --muted: #777777;
            --line: #e8e8e8;
            --background: #f5f5f5;
            --white: #ffffff;
        }

        body {
            background: var(--background);
            color: var(--dark);
        }

        button {
            font-family: inherit;
            cursor: pointer;
        }

        .page {
            width: 100%;
            max-width: 560px;
            min-height: 100vh;
            margin: 0 auto;
            padding-bottom: 110px;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px;
            background: var(--white);
            border-bottom: 1px solid var(--line);
        }

        .header-row {
            display: flex;
            align-items: center;
            gap: 13px;
        }

        .back-button {
            width: 42px;
            height: 42px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--white);
            color: var(--dark);
            font-size: 21px;
        }

        .header-title {
            font-size: 19px;
            font-weight: 900;
        }

        .header-subtitle {
            margin-top: 4px;
            color: var(--muted);
            font-size: 11px;
        }

        .content {
            padding: 14px;
        }

        .notice {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 13px;
            margin-bottom: 13px;
            border-radius: 13px;
            background: var(--orange-light);
            color: #b34700;
            font-size: 12px;
            font-weight: 800;
        }

        .card {
            padding: 17px;
            margin-bottom: 13px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--white);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
        }

        .card-title {
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 900;
        }

        .cart-list {
            display: grid;
            gap: 13px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 72px 1fr auto;
            align-items: center;
            gap: 11px;
            padding-bottom: 13px;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-item:last-child {
            padding-bottom: 0;
            border-bottom: none;
        }

        .item-image,
        .image-placeholder {
            width: 72px;
            height: 72px;
            border-radius: 14px;
            background: var(--orange-light);
        }

        .item-image {
            object-fit: cover;
        }

        .image-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .item-name {
            font-size: 14px;
            font-weight: 900;
            line-height: 1.3;
        }

        .item-description {
            margin-top: 5px;
            color: var(--muted);
            font-size: 10px;
            line-height: 1.4;
        }

        .item-price {
            margin-top: 6px;
            color: var(--orange);
            font-size: 13px;
            font-weight: 900;
        }

        .item-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: space-between;
            gap: 13px;
        }

        .delete-button {
            border: none;
            background: transparent;
            color: #999999;
            font-size: 17px;
        }

        .quantity-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quantity-button {
            width: 29px;
            height: 29px;
            border: 1px solid #eeeeee;
            border-radius: 9px;
            background: var(--white);
            color: var(--orange);
            font-size: 18px;
            font-weight: 900;
        }

        .quantity-number {
            min-width: 18px;
            text-align: center;
            font-size: 13px;
            font-weight: 900;
        }

        .comment-box {
            width: 100%;
            min-height: 82px;
            margin-top: 13px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #fafafa;
            font-size: 12px;
            outline: none;
            resize: vertical;
        }

        .comment-box:focus {
            border-color: var(--orange);
            background: var(--white);
        }

        .summary {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid var(--line);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            padding: 7px 0;
            color: var(--muted);
            font-size: 12px;
        }

        .summary-row strong {
            color: var(--dark);
        }

        .summary-total {
            margin-top: 4px;
            padding-top: 13px;
            border-top: 1px dashed #d5d5d5;
            color: var(--dark);
            font-size: 16px;
            font-weight: 900;
        }

        .summary-total strong {
            color: var(--orange);
            font-size: 18px;
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 13px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-left {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 12px;
        }

        .info-button {
            border: none;
            background: transparent;
            color: var(--orange);
            font-size: 12px;
            font-weight: 900;
        }

        .bottom-bar {
            position: fixed;
            left: 50%;
            bottom: 0;
            z-index: 100;
            width: 100%;
            max-width: 560px;
            transform: translateX(-50%);
            padding: 12px 14px 16px;
            background: rgba(255, 255, 255, 0.96);
            border-top: 1px solid var(--line);
            backdrop-filter: blur(10px);
        }

        .continue-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: var(--orange);
            color: var(--white);
            font-size: 14px;
            font-weight: 900;
            box-shadow: 0 8px 20px rgba(255, 90, 0, 0.25);
        }

        .empty-state {
            padding: 50px 20px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--white);
            text-align: center;
        }

        .empty-icon {
            font-size: 55px;
        }

        .empty-title {
            margin-top: 13px;
            font-size: 20px;
            font-weight: 900;
        }

        .empty-text {
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .menu-button {
            width: 100%;
            margin-top: 18px;
            padding: 15px;
            border: none;
            border-radius: 13px;
            background: var(--orange);
            color: var(--white);
            font-size: 14px;
            font-weight: 900;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<div class="page">

    <header class="header">
        <div class="header-row">

            <button
                    type="button"
                    class="back-button"
                    onclick="window.location.href='/'"
            >
                ←
            </button>

            <div>
                <div id="headerTitle" class="header-title">Себет</div>

                <div id="headerSubtitle" class="header-subtitle">
                    Тандалган тамактарды текшериңиз
                </div>
            </div>

        </div>
    </header>

    <main class="content">

        <div id="emptyState" class="empty-state hidden">

            <div class="empty-icon">🛒</div>

            <div id="emptyTitle" class="empty-title">Себет бош</div>

            <div id="emptyText" class="empty-text">
                Менюдан каалаган тамактарыңызды тандаңыз.
            </div>

            <button
                    id="emptyMenuButton"
                    class="menu-button"
                    onclick="window.location.href='/'"
            >
                Менюга кайтуу
            </button>

        </div>

        <div id="cartContent">

            <div id="cartNotice" class="notice">
                🛍 Себетиңизде 0 товар бар
            </div>

            <section class="card">

                <div id="cartItems" class="cart-list"></div>

                <textarea
                        id="cartComment"
                        class="comment-box"
                        placeholder="Комментарий: мисалы, пиязсыз даярдап коюңуз"
                ></textarea>

                <div class="summary">

                    <div class="summary-row">
                        <span id="foodTotalLabel">Товарлардын баасы</span>
                        <strong id="foodTotal">0 сом</strong>
                    </div>

                    <div class="summary-row summary-total">
                        <span id="totalPriceLabel">Жалпы сумма</span>
                        <strong id="totalPrice">0 сом</strong>
                    </div>

                </div>

            </section>

            <section class="card">

                <div class="info-row">

                    <div id="addressLabel" class="info-left">
                        📍 Жеткирүү дареги
                    </div>

                    <button
                            type="button"
                            class="info-button"
                            onclick="goToCheckout()"
                    >
                        <span class="add-info-text">Кошуу ›</span>
                    </button>

                </div>

                <div class="info-row">

                    <div id="phoneLabel" class="info-left">
                        📞 Телефон номери
                    </div>

                    <button
                            type="button"
                            class="info-button"
                            onclick="goToCheckout()"
                    >
                        <span class="add-info-text">Кошуу ›</span>
                    </button>

                </div>

                <div class="info-row">

                    <div id="nameLabel" class="info-left">
                        👤 Аты-жөнү
                    </div>

                    <button
                            type="button"
                            class="info-button"
                            onclick="goToCheckout()"
                    >
                        <span class="add-info-text">Кошуу ›</span>
                    </button>

                </div>

            </section>

        </div>

    </main>

    <div id="bottomBar" class="bottom-bar">

        <button
                type="button"
                class="continue-button"
                onclick="goToCheckout()"
        >
            <span id="checkoutText">Заказ берүү</span>
            <span id="bottomTotal">0 сом</span>
        </button>

    </div>

</div>

<script>
    let cart = JSON.parse(
        localStorage.getItem("cart")
    ) || [];

    let currentLanguage =
        localStorage.getItem("customerLanguage") || "ky";

    const QUANTITY_STEP = 0.1;
    const MIN_QUANTITY = 0.1;

    const translations = {
        ky: {
            cart: "Себет",
            cartSubtitle: "Тандалган тамактарды текшериңиз",
            emptyCart: "Себет бош",
            emptyText: "Менюдан каалаган тамактарыңызды тандаңыз.",
            backToMenu: "Менюга кайтуу",
            itemsInCart: "🛍 Себетиңизде {count} товар бар",
            commentPlaceholder: "Комментарий: мисалы, пиязсыз даярдап коюңуз",
            foodTotal: "Товарлардын баасы",
            totalPrice: "Жалпы сумма",
            address: "📍 Жеткирүү дареги",
            phone: "📞 Телефон номери",
            name: "👤 Аты-жөнү",
            addInfo: "Кошуу ›",
            checkout: "Заказ берүү",
            defaultDescription: "Даамдуу тамак",
            emptyAlert: "Себет бош!",
            som: "сом"
        },
        ru: {
            cart: "Корзина",
            cartSubtitle: "Проверьте выбранные блюда",
            emptyCart: "Корзина пуста",
            emptyText: "Выберите блюда из меню.",
            backToMenu: "Вернуться в меню",
            itemsInCart: "🛍 В корзине: {count}",
            commentPlaceholder: "Комментарий: например, без лука",
            foodTotal: "Стоимость блюд",
            totalPrice: "Итого",
            address: "📍 Адрес доставки",
            phone: "📞 Номер телефона",
            name: "👤 Имя",
            addInfo: "Добавить ›",
            checkout: "Оформить заказ",
            defaultDescription: "Вкусное блюдо",
            emptyAlert: "Корзина пуста!",
            som: "сом"
        }
    };

    function t(key) {
        return translations[currentLanguage][key] || key;
    }

    function roundQuantity(value) {
        return Math.round(Number(value || 0) * 10) / 10;
    }

    function formatQuantity(value) {
        const rounded = roundQuantity(value);

        if (Number.isInteger(rounded)) {
            return String(rounded);
        }

        return rounded.toFixed(1).replace(/\.0$/, "");
    }

    function changeQuantity(current, delta) {
        return roundQuantity(Number(current || 0) + delta);
    }

    function getCartItemName(item) {
        if (currentLanguage === "ru") {
            return item.nameRu || item.name || item.nameKg || t("defaultDescription");
        }

        return item.nameKg || item.name || item.nameRu || t("defaultDescription");
    }

    function applyLanguage() {
        document.documentElement.lang =
            currentLanguage === "ru" ? "ru" : "ky";

        document.getElementById("headerTitle").textContent = t("cart");
        document.getElementById("headerSubtitle").textContent = t("cartSubtitle");
        document.getElementById("emptyTitle").textContent = t("emptyCart");
        document.getElementById("emptyText").textContent = t("emptyText");
        document.getElementById("emptyMenuButton").textContent = t("backToMenu");
        document.getElementById("cartComment").placeholder = t("commentPlaceholder");
        document.getElementById("foodTotalLabel").textContent = t("foodTotal");
        document.getElementById("totalPriceLabel").textContent = t("totalPrice");
        document.getElementById("addressLabel").textContent = t("address");
        document.getElementById("phoneLabel").textContent = t("phone");
        document.getElementById("nameLabel").textContent = t("name");
        document.getElementById("checkoutText").textContent = t("checkout");

        document.querySelectorAll(".add-info-text").forEach((element) => {
            element.textContent = t("addInfo");
        });
    }

    function saveCart() {
        localStorage.setItem(
            "cart",
            JSON.stringify(cart)
        );
    }

    function renderCart() {
        const cartItems =
            document.getElementById("cartItems");

        const cartContent =
            document.getElementById("cartContent");

        const emptyState =
            document.getElementById("emptyState");

        const bottomBar =
            document.getElementById("bottomBar");

        if (cart.length === 0) {
            cartContent.classList.add("hidden");
            bottomBar.classList.add("hidden");
            emptyState.classList.remove("hidden");
            return;
        }

        cartContent.classList.remove("hidden");
        bottomBar.classList.remove("hidden");
        emptyState.classList.add("hidden");

        let html = "";
        let foodTotal = 0;
        let totalQuantity = 0;

        cart.forEach((item, index) => {
            const price = Number(item.price || 0);
            const quantity = roundQuantity(item.quantity || 0);
            const itemTotal = price * quantity;
            const itemName = getCartItemName(item);

            const imageHtml = item.image
                ? `
                    <img
                        class="item-image"
                        src="${escapeHtml(item.image)}"
                        alt="${escapeHtml(itemName)}"
                        onerror="this.outerHTML='<div class=&quot;image-placeholder&quot;>🍲</div>'"
                    >
                `
                : `
                    <div class="image-placeholder">
                        🍲
                    </div>
                `;

            html += `
                <div class="cart-item">

                    ${imageHtml}

                    <div>

                        <div class="item-name">
                            ${escapeHtml(itemName)}
                        </div>

                        <div class="item-description">
                            ${escapeHtml(t("defaultDescription"))}
                        </div>

                        <div class="item-price">
                            ${formatMoney(itemTotal)} ${escapeHtml(t("som"))}
                        </div>

                    </div>

                    <div class="item-right">

                        <button
                            type="button"
                            class="delete-button"
                            onclick="removeItem(${index})"
                        >
                            🗑
                        </button>

                        <div class="quantity-box">

                            <button
                                type="button"
                                class="quantity-button"
                                onclick="decreaseItem(${index})"
                            >
                                −
                            </button>

                            <span class="quantity-number">
                                ${formatQuantity(quantity)}
                            </span>

                            <button
                                type="button"
                                class="quantity-button"
                                onclick="increaseItem(${index})"
                            >
                                +
                            </button>

                        </div>

                    </div>

                </div>
            `;

            foodTotal += itemTotal;
            totalQuantity = roundQuantity(totalQuantity + quantity);
        });

        cartItems.innerHTML = html;

        document.getElementById("cartNotice").textContent =
            t("itemsInCart").replace(
                "{count}",
                formatQuantity(totalQuantity)
            );

        document.getElementById("foodTotal").textContent =
            formatMoney(foodTotal) + " " + t("som");

        document.getElementById("totalPrice").textContent =
            formatMoney(foodTotal) + " " + t("som");

        document.getElementById("bottomTotal").textContent =
            formatMoney(foodTotal) + " " + t("som");
    }

    function increaseItem(index) {
        cart[index].quantity =
            changeQuantity(cart[index].quantity, QUANTITY_STEP);

        saveCart();
        renderCart();
    }

    function decreaseItem(index) {
        cart[index].quantity =
            changeQuantity(cart[index].quantity, -QUANTITY_STEP);

        if (cart[index].quantity < MIN_QUANTITY) {
            cart.splice(index, 1);
        }

        saveCart();
        renderCart();
    }

    function removeItem(index) {
        cart.splice(index, 1);

        saveCart();
        renderCart();
    }

    function goToCheckout() {
        if (cart.length === 0) {
            alert(t("emptyAlert"));
            return;
        }

        const comment =
            document
                .getElementById("cartComment")
                .value
                .trim();

        localStorage.setItem(
            "cartComment",
            comment
        );

        window.location.href = "/receipt";
    }

    function formatMoney(value) {
        return Number(value || 0)
            .toLocaleString("ru-RU", {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            });
    }

    function escapeHtml(value) {
        if (
            value === null ||
            value === undefined
        ) {
            return "";
        }

        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    applyLanguage();
    renderCart();
</script>

</body>
</html>
